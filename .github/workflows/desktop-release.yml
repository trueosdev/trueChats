name: Desktop Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"
          # Single lockfile at repo root (npm workspaces); apps/www has none.
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build and publish desktop app
        run: npm run release --workspace=shadcn-chat
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
