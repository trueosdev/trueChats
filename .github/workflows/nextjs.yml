# Deploy a static export of apps/www to GitHub Pages (not a full replacement for Vercel:
# API routes and /auth/callback are removed in CI because `output: 'export'` cannot include them).
#
# First-time fix for "Get Pages site failed" / 404:
#   • Settings → Pages → Build and deployment → Source: "GitHub Actions"
#   OR add repo secret PAGES_ENABLEMENT_TOKEN (classic PAT: `repo`, or fine-grained:
#   Administration + Pages write). `enablement` does not work with GITHUB_TOKEN alone.
#
name: Deploy Next.js site to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect package manager
        id: detect-package-manager
        run: |
          if [ -f "${{ github.workspace }}/yarn.lock" ]; then
            echo "manager=yarn" >> $GITHUB_OUTPUT
            echo "command=install" >> $GITHUB_OUTPUT
            echo "runner=yarn" >> $GITHUB_OUTPUT
            exit 0
          elif [ -f "${{ github.workspace }}/package.json" ]; then
            echo "manager=npm" >> $GITHUB_OUTPUT
            echo "command=ci" >> $GITHUB_OUTPUT
            echo "runner=npx --no-install" >> $GITHUB_OUTPUT
            exit 0
          else
            echo "Unable to determine package manager"
            exit 1
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: ${{ steps.detect-package-manager.outputs.manager }}

      - name: Prepare static export (drop server routes)
        run: |
          rm -rf apps/www/src/app/api apps/www/src/app/auth/callback

      # enablement only works with a non-GITHUB_TOKEN (see actions/configure-pages action.yml).
      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          static_site_generator: next
          generator_config_file: apps/www/next.config.mjs
          enablement: ${{ secrets.PAGES_ENABLEMENT_TOKEN != '' }}
          token: ${{ secrets.PAGES_ENABLEMENT_TOKEN != '' && secrets.PAGES_ENABLEMENT_TOKEN || github.token }}

      - name: Restore cache
        uses: actions/cache@v4
        with:
          path: |
            apps/www/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json', '**/yarn.lock') }}-${{ hashFiles('**.[jt]s', '**.[jt]sx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json', '**/yarn.lock') }}-

      - name: Install dependencies
        run: npm install

      - name: Build UI package
        run: |
          cd packages/ui
          npm run build
          cd ../..

      - name: Build with Next.js
        run: |
          cd apps/www
          npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/www/out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
